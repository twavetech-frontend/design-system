name: Build Design Tokens
on:
  push:
    paths:
      - 'tokens.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build tokens
        run: node build.js
        
      - name: Commit CSS
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f build/css/tokens.css
          git commit -m "style: 디자인 토큰 CSS 자동 업데이트" || echo "No changes to commit"
          git push

      - name: Trigger docs site rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DOCS_DEPLOY_TOKEN }}" \
            https://api.github.com/repos/stresslee/design-system-docs/dispatches \
            -d '{"event_type":"tokens-updated"}'

      - name: Generate agent DESIGN_TOKENS.md
        run: node sync-to-agent.js --out /tmp/agent-ds

      - name: Trigger figma-design-agent token sync
        run: |
          # Upload DESIGN_TOKENS.md and TOKEN_MAP.json as dispatch payload
          TOKENS_MD=$(base64 -w0 /tmp/agent-ds/DESIGN_TOKENS.md)
          TOKEN_MAP=$(base64 -w0 /tmp/agent-ds/TOKEN_MAP.json)
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DOCS_DEPLOY_TOKEN }}" \
            https://api.github.com/repos/stresslee/figma-design-agent/dispatches \
            -d "{\"event_type\":\"tokens-updated\",\"client_payload\":{\"tokens_md\":\"${TOKENS_MD}\",\"token_map\":\"${TOKEN_MAP}\"}}"
