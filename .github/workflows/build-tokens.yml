name: Build Design Tokens
on:
  push:
    paths:
      - 'tokens.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build tokens
        run: node build.js
        
      - name: Commit CSS
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f build/css/tokens.css build/css/tokens-dark.css
          git commit -m "style: 디자인 토큰 CSS 자동 업데이트" || echo "No changes to commit"
          git push

      - name: Trigger docs site rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DOCS_DEPLOY_TOKEN }}" \
            https://api.github.com/repos/twavetech-frontend/design-system-docs/dispatches \
            -d '{"event_type":"tokens-updated"}'

      - name: Trigger figma-design-agent token sync
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DOCS_DEPLOY_TOKEN }}" \
            https://api.github.com/repos/twavetech-frontend/figma-design-agent/dispatches \
            -d '{"event_type":"tokens-updated"}'
