name: Build Tokens

on:
  push:
    branches: [main]
    paths:
      - 'tokens.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.DOCS_DEPLOY_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Commit token outputs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ios/ android/ web/
          if git diff --staged --quiet; then
            echo "No token output changes"
            exit 0
          fi
          git commit -m "chore(tokens): rebuild from Figma push [skip ci]"
          git push

      - name: Trigger design-system-docs rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DOCS_DEPLOY_TOKEN }}" \
            https://api.github.com/repos/twavetech-frontend/design-system-docs/dispatches \
            -d '{"event_type":"tokens-updated"}'

      - name: Trigger figma-design-agent token sync
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DOCS_DEPLOY_TOKEN }}" \
            https://api.github.com/repos/twavetech-frontend/figma-design-agent/dispatches \
            -d '{"event_type":"tokens-updated"}'

      - name: Trigger figma-design token sync
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DOCS_DEPLOY_TOKEN }}" \
            https://api.github.com/repos/twavetech-frontend/figma-design/dispatches \
            -d '{"event_type":"tokens-updated"}'
