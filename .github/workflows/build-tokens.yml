name: Build Design Tokens
on:
  push:
    paths:
      - 'tokens.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Style Dictionary
        run: npm install style-dictionary
        
      - name: Build tokens
        run: npx --yes style-dictionary build
        
      - name: Commit CSS
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add build/css/tokens.css
          # 변경사항이 있을 때만 커밋
          git commit -m "style: 디자인 토큰 CSS 자동 업데이트 🎨" || echo "No changes to commit"
          git push
